<!DOCTYPE html>
<html lang="{{ session.get('language','el') }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sophia — Εστία · CONDIAN HOTELS</title>
<meta name="theme-color" content="#193847">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" href="/static/style.css">
<style>
:root{--brand:{{ theme.primary }};--accent:{{ theme.accent }};}
*{box-sizing:border-box;}
body{display:flex;flex-direction:column;height:100vh;max-width:640px;margin:0 auto;background:#f4f8fb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a2730;}
.app-header.pool{background:var(--brand);flex-shrink:0;}
/* thin toolbar (always visible) */
.sbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#fff;border-bottom:1px solid #e6eef3;}
.sbar .who{display:flex;align-items:center;gap:9px;font-weight:700;font-size:14px;color:var(--brand);}
.sbar .who .av{width:26px;height:26px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;}
.sbar .who small{display:block;font-weight:500;font-size:11px;color:#8aa0ac;}
.newchat{border:1px solid #d4e4ec;background:#fff;color:var(--brand);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit;}
.newchat:hover{background:var(--brand);color:#fff;border-color:var(--brand);}
/* chat area */
.chat{flex:1;overflow-y:auto;padding:18px 14px 8px;}
.notice{background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:10px;padding:10px 13px;font-size:12.5px;margin-bottom:14px;display:flex;gap:7px;align-items:flex-start;}
/* empty state */
.empty{text-align:center;padding:26px 12px 8px;}
.empty .bigav{width:56px;height:56px;border-radius:50%;background:var(--brand);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:12px;box-shadow:0 6px 18px rgba(25,56,71,.25);}
.empty h1{font-size:19px;color:var(--brand);margin:0 0 4px;}
.empty p{font-size:13px;color:#7a94a2;margin:0 auto;max-width:400px;line-height:1.5;}
.sugg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px;}
.sugg .card{background:#fff;border:1px solid #e2edf2;border-radius:12px;padding:12px 13px;text-align:left;cursor:pointer;font-size:13px;color:#33505e;line-height:1.35;transition:border-color .15s,box-shadow .15s,transform .1s;}
.sugg .card:hover{border-color:var(--brand);box-shadow:0 4px 12px rgba(25,56,71,.08);transform:translateY(-1px);}
.sugg .card i{color:var(--accent);margin-right:6px;}
@media(max-width:440px){.sugg{grid-template-columns:1fr;}}
/* messages */
.row{display:flex;gap:9px;margin-bottom:14px;align-items:flex-end;}
.row.user{flex-direction:row-reverse;}
.row .av{width:28px;height:28px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.bubble{max-width:82%;padding:11px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-wrap:break-word;overflow-wrap:anywhere;}
.row.user .bubble{background:var(--brand);color:#fff;border-bottom-right-radius:5px;}
.row.bot .bubble{background:#fff;color:#1a2730;border:1px solid #e6eef3;border-bottom-left-radius:5px;}
.row.bot .bubble.err{background:#fee2e2;color:#b91c1c;border-color:#fecaca;}
.bubble p{margin:0 0 8px;}.bubble p:last-child{margin-bottom:0;}
.bubble ul,.bubble ol{margin:4px 0 8px;padding-left:20px;}.bubble li{margin:2px 0;}
.bubble code{background:rgba(25,56,71,.08);padding:1px 5px;border-radius:5px;font-size:12.5px;}
.bubble .h{font-weight:700;margin:6px 0 3px;color:var(--brand);}
.row.user .bubble .h{color:#fff;}
.typing{display:inline-flex;gap:4px;padding:4px 2px;}
.typing span{width:7px;height:7px;border-radius:50%;background:#9db4c0;animation:bob 1s infinite;}
.typing span:nth-child(2){animation-delay:.15s;}.typing span:nth-child(3){animation-delay:.3s;}
@keyframes bob{0%,60%,100%{transform:translateY(0);opacity:.5;}30%{transform:translateY(-4px);opacity:1;}}
/* composer */
.composer{flex-shrink:0;padding:10px 12px 4px;background:#fff;border-top:1px solid #e6eef3;}
.cbox{display:flex;gap:9px;align-items:flex-end;}
.cbox textarea{flex:1;resize:none;border:1.5px solid #d4e4ec;border-radius:14px;padding:11px 14px;font-size:15px;font-family:inherit;background:#f8fbfd;max-height:140px;line-height:1.4;}
.cbox textarea:focus{outline:none;border-color:var(--brand);}
.cbox button{background:var(--brand);color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:19px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.cbox button:disabled{background:#a9c2ce;cursor:default;}
.disclaimer{text-align:center;font-size:11px;color:#98abb6;padding:6px 8px 8px;line-height:1.4;}
</style>
<script>try{if(new URLSearchParams(location.search).get("embed")==="1"){document.documentElement.classList.add("embed");document.addEventListener("DOMContentLoaded",function(){document.querySelectorAll("a[href^='/']").forEach(function(a){var h=a.getAttribute("href");if(h&&h.indexOf("embed=")<0&&!a.target){a.setAttribute("href",h+(h.indexOf("?")<0?"?":"&")+"embed=1");}});});}}catch(e){}</script>
<style>.embed .app-header{display:none!important;}.embed body{background:#f4f8fb!important;}</style>
</head>
<body>

<header class="app-header pool">
  <div class="header-left">
    <a href="/" style="color:white;text-decoration:none;margin-right:6px;"><i class="ti ti-arrow-left" style="font-size:20px;"></i></a>
    <img src="/static/img/logo-white.svg" alt="CONDIAN" class="header-icon" style="height:26px;width:auto;">
    <div><div class="header-title">Sophia</div><div class="header-sub">Βοηθός Εστίας</div></div>
  </div>
</header>

<div class="sbar">
  <div class="who"><span class="av"><i class="ti ti-sparkles"></i></span><div>Sophia<small>Βοηθός Εστίας · CONDIAN</small></div></div>
  <button class="newchat" onclick="newChat()"><i class="ti ti-pencil-plus"></i> Νέα συνομιλία</button>
</div>

<div class="chat" id="chat"></div>

<div class="composer">
  <div class="cbox">
    <textarea id="input" rows="1" placeholder="Γράψε το μήνυμά σου…" oninput="grow(this)" onkeydown="onKey(event)"></textarea>
    <button id="send" onclick="send()" title="Αποστολή"><i class="ti ti-send"></i></button>
  </div>
  <div class="disclaimer">Η Sophia μπορεί να κάνει λάθη — επιβεβαίωσε σημαντικές πληροφορίες. Απαντά με βάση όσα βλέπεις εσύ.</div>
</div>

<script>
var CONFIGURED = {{ 'true' if configured else 'false' }};
var messages = [];
var busy = false;

var SUGG = [
  {i:'ti-help-circle', t:'Τι μπορείς να κάνεις;'},
  {i:'ti-droplet', t:'Ερμήνευσε τις τελευταίες μετρήσεις πισίνας'},
  {i:'ti-calendar', t:'Τι πρέπει να προσέξω σήμερα;'},
  {i:'ti-flask', t:'Δοσολογία για διόρθωση pH'}
];

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function mdToHtml(t){
  t = esc(t);
  t = t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t = t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  var lines = t.split('\n'), out=[], inUl=false, inOl=false;
  function closeL(){ if(inUl){out.push('</ul>');inUl=false;} if(inOl){out.push('</ol>');inOl=false;} }
  for(var k=0;k<lines.length;k++){
    var ln=lines[k];
    var mh=ln.match(/^#{1,4}\s+(.+)/);
    var mu=ln.match(/^\s*[-•*]\s+(.+)/);
    var mo=ln.match(/^\s*\d+[.)]\s+(.+)/);
    if(mh){ closeL(); out.push('<div class="h">'+mh[1]+'</div>'); }
    else if(mu){ if(!inUl){closeL();out.push('<ul>');inUl=true;} out.push('<li>'+mu[1]+'</li>'); }
    else if(mo){ if(!inOl){closeL();out.push('<ol>');inOl=true;} out.push('<li>'+mo[1]+'</li>'); }
    else if(ln.trim()===''){ closeL(); }
    else { closeL(); out.push('<p>'+ln+'</p>'); }
  }
  closeL();
  return out.join('');
}

function renderEmpty(){
  var cards = SUGG.map(function(s){return '<div class="card" onclick="quick(this)"><i class="ti '+s.i+'"></i>'+s.t+'</div>';}).join('');
  var notice = CONFIGURED ? '' : '<div class="notice"><i class="ti ti-alert-triangle"></i><span>Η Sophia δεν έχει ρυθμιστεί ακόμα. Όρισε πάροχο & κλειδί AI στην Κονσόλα AI για να ενεργοποιηθεί.</span></div>';
  document.getElementById('chat').innerHTML = notice +
    '<div class="empty"><div class="bigav"><i class="ti ti-sparkles"></i></div>'+
    '<h1>Γεια σου! Είμαι η Sophia 👋</h1>'+
    '<p>Ο ψηφιακός βοηθός της Εστίας. Ρώτησέ με για λειτουργίες, πρόγραμμα/βάρδιες, συντήρηση, βλάβες ή χημεία πισίνας.</p>'+
    '<div class="sugg">'+cards+'</div></div>';
}

function addMsg(text, who){
  var chat=document.getElementById('chat');
  var emp=chat.querySelector('.empty'); if(emp){ chat.innerHTML=''; }
  var row=document.createElement('div'); row.className='row '+who;
  var av = who==='bot' ? '<span class="av"><i class="ti ti-sparkles"></i></span>' : '<span class="av"><i class="ti ti-user"></i></span>';
  var b=document.createElement('div'); b.className='bubble';
  if(who==='bot'){ b.innerHTML = mdToHtml(text); } else { b.textContent = text; }
  row.innerHTML = av; row.appendChild(b);
  chat.appendChild(row); chat.scrollTop=1e9;
  return b;
}

function grow(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,140)+'px'; }
function quick(el){ var inp=document.getElementById('input'); inp.value=el.textContent; send(); }
function onKey(e){ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } }
function newChat(){ messages=[]; renderEmpty(); var i=document.getElementById('input'); i.value=''; grow(i); }

async function send(){
  if(busy) return;
  var inp=document.getElementById('input');
  var text=(inp.value||'').trim(); if(!text) return;
  inp.value=''; grow(inp);
  addMsg(text,'user');
  messages.push({role:'user',content:text});
  busy=true; document.getElementById('send').disabled=true;
  var b=addMsg('','bot'); b.innerHTML='<span class="typing"><span></span><span></span><span></span></span>';
  try{
    var res=await fetch('/api/assistant',{method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({messages:messages})});
    var data=await res.json();
    if(data.error==='not_configured'){
      b.className='bubble err'; b.textContent='Η Sophia δεν έχει ρυθμιστεί ακόμα (λείπει πάροχος/κλειδί AI). Ρύθμισέ το στην Κονσόλα AI.';
    } else if(data.error){
      b.className='bubble err'; b.textContent='Σφάλμα: '+data.error;
    } else {
      b.innerHTML=mdToHtml(data.reply||'—');
      messages.push({role:'assistant',content:data.reply});
    }
  }catch(e){
    b.className='bubble err'; b.textContent='Σφάλμα σύνδεσης. Δοκίμασε ξανά.';
  }
  document.getElementById('chat').scrollTop=1e9;
  busy=false; document.getElementById('send').disabled=false;
}

renderEmpty();
</script>
</body>
</html>
