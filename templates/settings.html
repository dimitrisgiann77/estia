<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Εστία — Ρυθμίσεις</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script>(function(){try{var m=(document.cookie.match(/(?:^|; )estia_theme=([^;]+)/)||[])[1]||'day';var d=m==='dark'||(m==='system'&&window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches);if(d)document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<link rel="stylesheet" href="/static/estia-theme.css">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f0f7ff; color:#1a1a1a; }
.topbar { background:#193847; color:white; padding:14px 24px; }
.topbar-title { font-size:16px; font-weight:600; }
.topbar-sub { font-size:12px; opacity:0.75; margin-top:2px; }
.container { max-width:680px; margin:0 auto; padding:24px; }
.card { background:white; border-radius:12px; padding:20px; border:1px solid #e0f0ff; margin-bottom:18px; }
.card-title { font-size:14px; font-weight:600; color:#333; margin-bottom:14px; display:flex; align-items:center; gap:6px; }
.row { display:flex; gap:8px; flex-wrap:wrap; }
.pill { flex:1; min-width:90px; display:flex; align-items:center; justify-content:center; gap:6px; font-size:13px; padding:10px; border-radius:10px; border:1px solid #d6eef3; background:#fff; color:#44535f; cursor:pointer; text-decoration:none; }
.pill:hover { background:#f3f7f9; }
.pill.on { background:#193847; color:#fff; border-color:#193847; font-weight:600; }
.hint { font-size:12px; color:#9aa7ad; margin-top:8px; }
</style>
<style>:root{--brand:{{ theme.primary }};}.topbar{background:var(--brand)!important;}.pill.on{background:var(--brand)!important;border-color:var(--brand)!important;}</style>
<style>html[data-theme="dark"] .pill{background:#1b2735;border-color:#2c3a4a;color:#c4d0dc;}</style>
<script>try{if(new URLSearchParams(location.search).get("embed")==="1"){document.documentElement.classList.add("embed");}}catch(e){}</script>
<style>.embed .topbar{display:none!important;}.embed body{background:transparent!important;}</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-title"><i class="ti ti-settings"></i> ΕΣΤΙΑ — Ρυθμίσεις</div>
  <div class="topbar-sub">Προτιμήσεις χρήστη</div>
</div>
<div class="container">

  <div class="card">
    <div class="card-title"><i class="ti ti-language"></i> Γλώσσα</div>
    <div class="row">
      <a class="pill {{ 'on' if session.get('language','el')=='el' }}" href="/set-language/el">🇬🇷 Ελληνικά</a>
      <a class="pill {{ 'on' if session.get('language')=='en' }}" href="/set-language/en">🇬🇧 English</a>
    </div>
    <div class="hint">Οι μεταφράσεις EN προστίθενται σταδιακά.</div>
  </div>

  <div class="card">
    <div class="card-title"><i class="ti ti-palette"></i> Θέμα εμφάνισης</div>
    <div class="row" id="themes">
      <button class="pill" data-mode="day" onclick="setTheme('day')"><i class="ti ti-sun"></i> Φωτεινό</button>
      <button class="pill" data-mode="dark" onclick="setTheme('dark')"><i class="ti ti-moon"></i> Σκούρο</button>
      <button class="pill" data-mode="system" onclick="setTheme('system')"><i class="ti ti-device-desktop"></i> Σύστημα</button>
    </div>
    <div class="hint">Το «Σύστημα» ακολουθεί τη ρύθμιση της συσκευής σου.</div>
  </div>

  <div class="card">
    <div class="card-title"><i class="ti ti-user-cog"></i> Λογαριασμός</div>
    <div class="row">
      <a class="pill" href="/account?embed=1"><i class="ti ti-id-badge"></i> Λογαριασμός μου</a>
      <a class="pill" href="/profile?embed=1"><i class="ti ti-user"></i> Επεξεργασία προφίλ</a>
    </div>
  </div>

</div>
<script>
function _ck(n){ return (document.cookie.match(new RegExp('(?:^|; )'+n+'=([^;]+)'))||[])[1]; }
function markTheme(){ var m=_ck('estia_theme')||'day'; document.querySelectorAll('#themes .pill').forEach(function(b){ b.classList.toggle('on', b.getAttribute('data-mode')===m); }); }
function setTheme(mode){
  document.cookie='estia_theme='+mode+';path=/;max-age=31536000';
  try{ localStorage.setItem('estia_theme',mode); }catch(e){}
  try{ if(window.parent && window.parent!==window){ window.parent.location.reload(); return; } }catch(e){}
  location.reload();
}
markTheme();
</script>
</body>
</html>
