<!DOCTYPE html><html lang="el"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Templates τομέων</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#eff9fb;}
.topbar{background:#193847;color:#fff;padding:14px 24px;display:flex;justify-content:space-between;}.topbar a{color:#fff;text-decoration:none;font-size:13px;padding:6px 12px;background:rgba(255,255,255,.15);border-radius:6px;}
.container{max-width:820px;margin:0 auto;padding:24px;}.card{background:#fff;border-radius:12px;padding:18px;border:1px solid #d6eef3;margin-bottom:16px;}.card-title{font-weight:600;margin-bottom:12px;}
.row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5;}.muted{color:#999;font-size:12px;}
input,select{padding:9px 11px;border:1px solid #ddd;border-radius:7px;font-size:14px;}.btn{padding:9px 16px;border:none;border-radius:8px;background:#193847;color:#fff;font-weight:500;cursor:pointer;text-decoration:none;}
.add{display:grid;grid-template-columns:1fr 1fr;gap:10px;}@media(max-width:560px){.add{grid-template-columns:1fr;}}</style><style>:root{--brand:{{ theme.primary }};--accent:{{ theme.accent }};}
.app-header,.app-header.pool,.topbar{background:var(--brand)!important;}
.submit-btn,.submit-btn.pool,.btn-primary,.save-btn,.btn{background:var(--brand)!important;}</style>
<script>try{if(new URLSearchParams(location.search).get("embed")==="1"){document.documentElement.classList.add("embed");document.addEventListener("DOMContentLoaded",function(){document.querySelectorAll("a[href^='/']").forEach(function(a){var h=a.getAttribute("href");if(h&&h.indexOf("embed=")<0&&!a.target){a.setAttribute("href",h+(h.indexOf("?")<0?"?":"&")+"embed=1");}});});}}catch(e){}</script>
<style>.embed .app-header,.embed .topbar{display:none!important;}.embed body{background:transparent!important;}</style>
</head><body>
<div class="topbar"><div><strong><img src="/static/img/logo-white.svg" style="height:20px;vertical-align:middle;margin-right:8px;">Templates τομέων</strong></div><div><a href="/areas/dashboard"><i class="ti ti-arrow-left"></i> Πίνακας</a></div></div>
<div class="container">
  <div class="card"><div class="card-title"><i class="ti ti-template"></i> Τύποι παρακολούθησης</div>
  {% for t in templates %}<div class="row"><span><i class="ti {{ t.icon }}"></i> <b>{{ t.name }}</b> <span class="muted">· {{ freq_label.get(t.frequency, t.frequency) }} · {{ t.params|length }} παράμετροι</span></span>
    <a class="btn" href="/dashboard/template/{{ t.key }}" style="padding:6px 14px;font-size:13px;">Επεξεργασία</a></div>
  {% endfor %}</div>
  <div class="card"><div class="card-title"><i class="ti ti-plus"></i> Νέος τύπος</div>
    <form method="POST" action="/dashboard/template/new"><div class="add">
      <input type="text" name="key" placeholder="key (π.χ. fire) — λατινικά" required>
      <input type="text" name="name" placeholder="Όνομα (π.χ. Πυρασφάλεια)" required>
      <input type="text" name="icon" placeholder="icon (π.χ. ti-flame)" value="ti-checklist">
      <select name="frequency"><option value="twice">2×/ημέρα</option><option value="daily" selected>Καθημερινά</option><option value="weekly">Εβδομαδιαία</option><option value="monthly">Μηνιαία</option></select>
      <button class="btn" type="submit" style="grid-column:1/-1;">Δημιουργία & επεξεργασία</button>
    </div></form></div>
</div></body></html>
